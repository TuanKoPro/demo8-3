<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Yêu Anh - 8/3</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Arial', sans-serif;
            background-color: #0b132b;
        }
        body{
            user-select:none;
        }
        
        /* 1. MÀN HÌNH CHỜ (ĐÃ THAY ĐỔI) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Nền tối mờ */
            backdrop-filter: blur(8px); /* Làm mờ hậu cảnh */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.2s ease-in-out;
        }

        .card {
            position: relative;
            background: white;
            padding: 40px 50px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,.3);
            z-index: 5;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .card:before {
            content: "";
            position: absolute;
            inset: -10px;
            border: 6px solid #ffd6e5;
            border-radius: 45px;
            pointer-events: none;
        }

        .avatar-circle {
            width: 140px; height: 140px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 25px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: pulse 2s infinite; overflow: hidden;
            border: 4px solid #f8bbd0;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .title-card {
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            color: #6d4c41;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .btn-open {
            background: linear-gradient(45deg, #7b5cff, #b388ff);
            border: none;
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 10px 20px rgba(0,0,0,.2);
            font-weight: bold;
        }
        .btn-open:hover { transform: scale(1.1); box-shadow: 0 15px 25px rgba(123, 92, 255, 0.4); }

        /* Sparkling effect */
        .sparkle {
            position: absolute; width: 4px; height: 4px; background: white;
            border-radius: 50%; animation: sparkleAnim 3s infinite; pointer-events: none;
        }
        @keyframes sparkleAnim { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* 2. HIỆU ỨNG PHÁO HOA & NỀN (GIỮ NGUYÊN) */
        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }

        #main-content {
            width: 100%; height: 100vh;
            background: #0b132b url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 2s ease-in-out;
            position: relative;
        }

        /* 3. KHUNG BỨC THƯ (GIỮ NGUYÊN) */
        .letter-bg {
            width: 90%; max-width: 550px; min-height: 400px;
            background: #fff9f0; padding: 40px; border-radius: 15px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            font-family: 'Dancing Script', cursive;
            border: 8px solid #f8bbd0; transform: rotate(-1deg);
            z-index: 101; transition: transform 0.8s ease, opacity 0.8s ease;
            box-sizing: border-box;
        }

        .close-wrapper {
            position: absolute; top: 10px; right: 15px;
            width: 35px; height: 35px; z-index: 102;
        }
        .close-btn {
            width: 100%; height: 100%;
            background: #d81b60; color: white; border-radius: 50%;
            text-align: center; line-height: 35px;
            font-family: Arial; font-size: 18px; cursor: pointer;
            transition: 0.3s; font-weight: bold;
            animation: cuteBounce 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(216, 27, 96, 0.5);
        }

        @keyframes cuteBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15) translateY(2px); }
        }

        #guide-arrow {
            position: absolute; top: -75px; right: -43px; width: 120px;
            color: #d81b60; opacity: 0; transition: 0.5s;
            pointer-events: none; z-index: 103;
            display: flex; flex-direction: column; align-items: center;
        }

        #guide-arrow span { 
            font-family: 'Arial'; font-size: 13px; font-weight: bold; 
            background: #ffeb3b; padding: 3px 10px; border-radius: 20px;
            margin-bottom: 2px; border: 1.5px solid #f06292;
        }

        .icon-anim { font-size: 30px; animation: superBounce 1.2s infinite; }

        @keyframes superBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(15px) scaleY(0.8) scaleX(1.1); }
            60% { transform: translateY(7px) scaleY(1.1); }
        }

        #type-text { font-size: 1.6rem; line-height: 1.4; color: #444; white-space: pre-line; }

        .signature {
            text-align: right; margin-top: 25px; font-weight: bold;
            color: #d81b60; font-size: 1.8rem; opacity: 0; transition: 2s;
        }

        /* 4. MÀN HÌNH FINAL (GIỮ NGUYÊN) */
        #final-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 2.5s ease;
        }
        
        .sub-text {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: #ff80ab;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 128, 171, 0.9), 
                         0 0 30px rgba(255, 128, 171, 0.5);
            padding: 0 20px;
            max-width: 85%;
        }

        /* 5. VẬT THỂ BAY (GIỮ NGUYÊN) */
        .floating { 
            position: absolute; bottom: -180px; z-index: 1000; 
            animation: fly var(--duration) linear forwards; 
            will-change: transform;
        }
        .img-item { 
            width: 140px; height: 140px; object-fit: cover; 
            border-radius: 15px; border: 5px solid white; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }
        .heart-item { color: #ff4d6d; font-size: 40px; text-shadow: 0 0 10px white; }

        @keyframes fly {
            0% { transform: translateY(0) rotate(var(--rot)); left: var(--left); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-130vh) rotate(calc(var(--rot) + 80deg)); left: var(--left); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="overlay">
        <div class="card">
            <div class="avatar-circle">
                <img src="https://cdn.lala.com.vn/image/1/230224/bo-10-bong-hoa-sap-sac-do-ruc-ro2.jpg" alt="Hoa">
            </div>
            <div class="title-card">Người đẹp có một bức thư mới...</div>
            <button class="btn-open" onclick="openGift()">❤️ Mở ngayyy ❤️ </button>
        </div>
    </div>

    <div id="main-content">
        <div class="letter-bg" id="letter">
            <div class="close-wrapper">
                <div class="close-btn" onclick="closeLetter()">X</div>
                <div id="guide-arrow">
                    <span>Tắt thư </span>
                    <div class="icon-anim">❤️</div>
                </div>
            </div>
            
            <div id="type-text"></div>
            <div class="signature" id="signature">Anh yêu em ❤️</div>
        </div>

        <div id="final-screen">
            <div class="sub-text">Mãi xinh đẹp và hạnh phúc nhé Công chúa của anh 🌸</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="noinaycoanh.mp3" type="audio/mpeg">
    </audio>

    <script>
        const message = `Em thân yêu,

Chúc em ngày 8/3 ngọt ngào như chính em vậy!

Cảm ơn em đã tin tưởng và sát cánh bên anh. Mong em luôn giữ được nụ cười tươi, luôn mạnh mẽ và hạnh phúc.

Anh sẽ cố gắng để em không bao giờ phải thất vọng. Yêu em!`;

        const photos = ['aza.jpg', 'aza1.jpg', 'aza2.jpg','aza3.jpg', 'aza4.jpg', 'aza5.jpg','aza6.jpg']; 
        const hearts = ['❤️', '💖', '💗', '🌸', '✨', '🌹'];
        
        let spawnInterval;

        // Sparkle effect for overlay
        const overlay = document.getElementById('overlay');
        for(let i=0; i<40; i++){
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + "%";
            s.style.top = Math.random() * 100 + "%";
            s.style.animationDelay = Math.random() * 3 + "s";
            overlay.appendChild(s);
        }

        function openGift() {
            document.getElementById('bgMusic').play().catch(() => {});
            initFireworks();
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'flex';
                setTimeout(() => {
                    main.style.opacity = '1';
                    setTimeout(startTyping, 800);
                }, 100);
                spawnInterval = setInterval(createFloating, 800);
            }, 1000);
        }

        function closeLetter() {
            const letter = document.getElementById('letter');
            const finalScreen = document.getElementById('final-screen');
            const arrow = document.getElementById('guide-arrow');
            
            arrow.style.display = 'none';
            letter.style.opacity = '0';
            letter.style.transform = 'scale(0.5) rotate(15deg)';
            
            setTimeout(() => {
                letter.style.display = 'none';
                finalScreen.style.visibility = 'visible';
                finalScreen.style.opacity = '1';
                
                clearInterval(spawnInterval);
                spawnInterval = setInterval(createFloating, 800); 

                for(let i=0; i<5; i++) {
                    setTimeout(initFireworks, i * 10000);
                }
            }, 800);
        }

        function startTyping() {
            let i = 0;
            const container = document.getElementById('type-text');
            function type() {
                if (i <= message.length) {
                    container.textContent = message.slice(0, i);
                    i++;
                    let delay = 50;
                    if (message.charAt(i-1) === ',') delay = 350;
                    if (message.charAt(i-1) === '.') delay = 600;
                    setTimeout(type, delay);
                } else {
                    document.getElementById('signature').style.opacity = '1';
                    setTimeout(() => {
                        document.getElementById('guide-arrow').style.opacity = '1';
                    }, 1000);
                }
            }
            type();
        }

        function createFloating() {
            const isHeart = Math.random() < 0.35;
            const el = document.createElement(isHeart ? 'div' : 'img');
            el.className = 'floating ' + (isHeart ? 'heart-item' : 'img-item');
            
            if(isHeart) {
                el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            } else {
                el.src = photos[Math.floor(Math.random() * photos.length)];
                el.onerror = function() {
                    this.outerHTML = `<div class="floating heart-item" style="--left:${this.style.getPropertyValue('--left')}; --duration:${this.style.getPropertyValue('--duration')}; --rot:${this.style.getPropertyValue('--rot')}">💖</div>`;
                };
            }

            const left = Math.random() * 90 + '%';
            const duration = (Math.random() * 3 + 4) + 's'; 
            
            el.style.setProperty('--left', left);
            el.style.setProperty('--duration', duration);
            el.style.setProperty('--rot', (Math.random() * 80 - 40) + 'deg');
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initFireworks() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width, 
                    y: canvas.height,
                    size: Math.random() * 18 + 10,
                    velX: (Math.random() - 0.5) * 14,
                    velY: (Math.random() * -18) - 7,
                    opacity: 1,
                    color: hearts[Math.floor(Math.random() * hearts.length)]
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.velX; p.y += p.velY; 
                p.velY += 0.12;
                p.opacity -= 0.01;
                ctx.globalAlpha = p.opacity;
                ctx.font = p.size + 'px serif';
                ctx.fillText(p.color, p.x, p.y);
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Anti-copy/Inspect scripts
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.addEventListener("copy", e => e.preventDefault());
        document.addEventListener("selectstart", e => e.preventDefault());
        document.addEventListener("keydown", e => {
            if(e.key === "F12" || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
