<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Yêu Anh - 8/3</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Arial', sans-serif;
            background-color: #0b132b;
        }

        /* 1. MÀN HÌNH CHỜ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ce93d8 0%, #ab47bc 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.2s ease-in-out;
        }

        .avatar-circle {
            width: 140px; height: 140px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: pulse 2s infinite; overflow: hidden;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .btn-open {
            padding: 15px 40px; background: rgba(255, 255, 255, 0.2); color: white;
            border: 2px solid white; border-radius: 50px; font-size: 1.2rem;
            cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-open:hover { background: white; color: #ab47bc; }

        /* 2. HIỆU ỨNG PHÁO HOA & NỀN */
        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }

        #main-content {
            width: 100%; height: 100vh;
            background: #0b132b url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 2s ease-in-out;
            position: relative;
        }

        /* 3. KHUNG BỨC THƯ */
        .letter-bg {
            width: 90%; max-width: 550px; min-height: 400px;
            background: #fff9f0; padding: 40px; border-radius: 15px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            font-family: 'Dancing Script', cursive;
            border: 8px solid #f8bbd0; transform: rotate(-1deg);
            z-index: 101; transition: transform 0.8s ease, opacity 0.8s ease;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute; top: 10px; right: 15px;
            background: #d81b60; color: white; border-radius: 50%;
            width: 30px; height: 30px; text-align: center; line-height: 30px;
            font-family: Arial; font-size: 16px; cursor: pointer; z-index: 102;
            transition: 0.3s;
        }
        .close-btn:hover { transform: scale(1.2); background: #ad1457; }

        #type-text { font-size: 1.6rem; line-height: 1.4; color: #444; white-space: pre-line; }

        .signature {
            text-align: right; margin-top: 25px; font-weight: bold;
            color: #d81b60; font-size: 1.8rem; opacity: 0; transition: 2s;
        }

        /* 4. MÀN HÌNH HAPPY WOMEN'S DAY (ẨN LÚC ĐẦU) */
        #final-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; width: 100%;
            opacity: 0; visibility: hidden; transition: 2s;
            z-index: 50;
        }
        .happy-text {
            font-family: 'Pacifico', cursive;
            font-size: 5rem; color: #ffeb3b;
            text-shadow: 0 0 20px #ff4081, 0 0 40px #f48fb1;
            margin: 0;
        }
        .sub-text {
            font-size: 2rem; color: white;
            font-style: italic; margin-top: 20px;
        }

        /* 5. VẬT THỂ BAY */
        .floating { position: absolute; bottom: -150px; z-index: 1000; animation: fly var(--duration) linear forwards; }
        .img-item { width: 120px; height: 120px; object-fit: cover; border-radius: 15px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .heart-item { color: #ff4d6d; font-size: 30px; }

        @keyframes fly {
            0% { transform: translateY(0) rotate(var(--rot)); left: var(--left); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(calc(var(--rot) + 60deg)); left: var(--left); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="overlay">
        <div class="avatar-circle">
            <img src="https://cdn.lala.com.vn/image/1/230224/bo-10-bong-hoa-sap-sac-do-ruc-ro2.jpg" alt="Hoa">
        </div>
        <div style="color: white; font-size: 1.5rem; margin-bottom: 30px; font-style: italic;">Người đẹp có một bức thư mới...</div>
        <button class="btn-open" onclick="openGift()">📩 Mở quà thôi!</button>
    </div>

    <div id="main-content">
        <div class="letter-bg" id="letter">
            <div class="close-btn" onclick="closeLetter()">X</div>
            <div id="type-text"></div>
            <div class="signature" id="signature">Anh yêu em ❤️</div>
        </div>

        <div id="final-screen">
            <h1 class="happy-text">Happy Women's Day!</h1>
            <div class="sub-text">Mãi xinh đẹp và hạnh phúc nhé Công chúa của anh 🌸</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="noinaycoanh.mp3" type="audio/mpeg">
    </audio>

    <script>
        const message = `Em thân yêu,

Chúc em ngày 8/3 ngọt ngào như chính em vậy!

Cảm ơn em đã tin tưởng và sát cánh bên anh. Mong em luôn giữ được nụ cười tươi, luôn mạnh mẽ và hạnh phúc.

Anh sẽ cố gắng để em không bao giờ phải thất vọng. Yêu em!`;

        const photos = ['test.jpg', 'test1.jpg', 'test2.jpg']; 
        const hearts = ['❤️', '💖', '💗', '🌸', '✨'];

        function openGift() {
            document.getElementById('bgMusic').play().catch(() => {});
            initFireworks();
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'flex';
                setTimeout(() => {
                    main.style.opacity = '1';
                    setTimeout(startTyping, 800);
                }, 100);
                setInterval(createFloating, 800);
            }, 1000);
        }

        // Đóng thư và hiện background mới
        function closeLetter() {
            const letter = document.getElementById('letter');
            const finalScreen = document.getElementById('final-screen');
            
            letter.style.opacity = '0';
            letter.style.transform = 'scale(0.5) rotate(10deg)';
            
            setTimeout(() => {
                letter.style.display = 'none';
                finalScreen.style.visibility = 'visible';
                finalScreen.style.opacity = '1';
                // Tăng cường hiệu ứng pháo hoa khi hiện chữ Happy
                for(let i=0; i<3; i++) setTimeout(initFireworks, i*500);
            }, 800);
        }

        function startTyping() {
            let i = 0;
            const container = document.getElementById('type-text');
            function type() {
                if (i <= message.length) {
                    container.textContent = message.slice(0, i);
                    i++;
                    let delay = 50;
                    if (message.charAt(i-1) === ',') delay = 350;
                    if (message.charAt(i-1) === '.') delay = 600;
                    setTimeout(type, delay);
                } else {
                    document.getElementById('signature').style.opacity = '1';
                }
            }
            type();
        }

        // --- PHÁO HOA ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initFireworks() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: canvas.height,
                    size: Math.random() * 15 + 10,
                    velX: (Math.random() - 0.5) * 10,
                    velY: (Math.random() * -15) - 5,
                    opacity: 1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.velX; p.y += p.velY; p.velY += 0.1; p.opacity -= 0.01;
                ctx.globalAlpha = p.opacity;
                ctx.font = p.size + 'px serif';
                ctx.fillText('❤️', p.x, p.y);
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        draw();

        function createFloating() {
            const isHeart = Math.random() < 0.5;
            const el = document.createElement(isHeart ? 'div' : 'img');
            el.className = 'floating ' + (isHeart ? 'heart-item' : 'img-item');
            if(isHeart) el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            else el.src = photos[Math.floor(Math.random() * photos.length)];
            const left = Math.random() * 95 + '%';
            const duration = (Math.random() * 5 + 7) + 's';
            el.style.setProperty('--left', left);
            el.style.setProperty('--duration', duration);
            el.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 10000);
        }
    </script>
</body>
</html>
